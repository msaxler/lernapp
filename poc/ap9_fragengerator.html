<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP9 — Fragengerator PoC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
  :root {
    --bg: #0e0f11; --surface: #16181c; --surface2: #1e2127;
    --border: #2a2d35; --accent: #8b5cf6; --accent2: #10b981;
    --text: #e8eaf0; --muted: #6b7280; --danger: #ef4444;
    --warn: #f59e0b; --radius: 10px; --font: 'DM Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 24px 16px 48px; }
  header { width: 100%; max-width: 680px; margin-bottom: 28px;
    border-bottom: 1px solid var(--border); padding-bottom: 14px; }
  header h1 { font-size: 12px; letter-spacing: .15em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 4px; }
  header p { font-size: 20px; color: var(--text); letter-spacing: -.02em; }
  main { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 14px; }

  .panel { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; }
  .panel-header { padding: 11px 16px; border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
  .panel-body { padding: 16px; }

  .badge { display: inline-block; font-size: 11px; letter-spacing: .1em;
    text-transform: uppercase; padding: 2px 8px; border-radius: 4px; margin-left: 6px; }
  .badge-gray   { background: rgba(107,114,128,.12); color: var(--muted); border: 1px solid var(--border); }
  .badge-green  { background: rgba(16,185,129,.15); color: #34d399; border: 1px solid rgba(16,185,129,.3); }
  .badge-purple { background: rgba(139,92,246,.15); color: #a78bfa; border: 1px solid rgba(139,92,246,.3); }
  .badge-red    { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px;
    border-radius: 6px; font-family: var(--font); font-size: 12px; letter-spacing: .05em;
    cursor: pointer; border: none; transition: opacity .15s; }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #7c3aed; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

  /* Quiz */
  .frage-text { font-size: 18px; line-height: 1.5; margin-bottom: 20px;
    color: var(--text); font-weight: bold; }
  .antworten { display: flex; flex-direction: column; gap: 10px; }
  .antwort-btn { background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; text-align: left;
    color: var(--text); font-family: var(--font); font-size: 14px;
    cursor: pointer; transition: border-color .15s, background .15s; }
  .antwort-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(139,92,246,.1); }
  .antwort-btn.richtig { background: rgba(16,185,129,.15); border-color: #10b981; color: #34d399; }
  .antwort-btn.falsch  { background: rgba(239,68,68,.15);  border-color: #ef4444; color: #f87171; }
  .antwort-btn:disabled { cursor: default; }

  .erklaerung { margin-top: 14px; padding: 12px; background: var(--surface2);
    border-radius: 6px; font-size: 13px; color: var(--muted);
    border-left: 3px solid var(--accent); display: none; }

  .stats { display: flex; gap: 16px; font-size: 13px; }
  .stat { text-align: center; }
  .stat-val { font-size: 24px; font-weight: bold; color: var(--accent); }
  .stat-lbl { color: var(--muted); font-size: 11px; }

  /* Filter */
  select { background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--font);
    font-size: 13px; padding: 8px 12px; outline: none; }

  .log { background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; height: 120px; overflow-y: auto; padding: 8px 12px;
    font-size: 11px; color: var(--muted); }

  .hidden { display: none !important; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>QuizAway · AP9</h1>
  <p>Fragengerator PoC <span id="status-badge" class="badge badge-gray">lädt...</span></p>
</header>

<main>

  <!-- Statistik -->
  <div class="panel">
    <div class="panel-header">Session-Statistik</div>
    <div class="panel-body">
      <div class="stats">
        <div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">Fragen</div></div>
        <div class="stat"><div class="stat-val" id="stat-richtig" style="color:#10b981">0</div><div class="stat-lbl">Richtig</div></div>
        <div class="stat"><div class="stat-val" id="stat-falsch" style="color:#ef4444">0</div><div class="stat-lbl">Falsch</div></div>
        <div class="stat"><div class="stat-val" id="stat-pct">—</div><div class="stat-lbl">Quote</div></div>
      </div>
    </div>
  </div>

  <!-- Filter -->
  <div class="panel">
    <div class="panel-header">Einstellungen</div>
    <div class="panel-body">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">FRAGETYP</div>
          <select id="sel-typ">
            <option value="bundesland">Bundesland der Stadt</option>
            <option value="einwohner">Einwohnerzahl schätzen</option>
            <option value="hoehe">Höhenlage schätzen</option>
          </select>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">SCHWIERIGKEIT</div>
          <select id="sel-schwierigkeit">
            <option value="alle">Alle Städte</option>
            <option value="gross" selected>Große Städte (>50.000)</option>
            <option value="mittel">Mittelstädte (>10.000)</option>
          </select>
        </div>
        <div style="margin-top:18px;">
          <button class="btn btn-primary" id="btn-naechste" onclick="naechsteFrage()" disabled>
            Nächste Frage →
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Quiz -->
  <div class="panel" id="quiz-panel">
    <div class="panel-header">
      Frage
      <span id="frage-badge" class="badge badge-gray">—</span>
    </div>
    <div class="panel-body">
      <div id="frage-text" class="frage-text">Datenbank wird geladen...</div>
      <div id="antworten" class="antworten"></div>
      <div id="erklaerung" class="erklaerung"></div>
      <div class="btn-row" id="weiter-row" style="display:none;">
        <button class="btn btn-primary" onclick="naechsteFrage()">Nächste Frage →</button>
      </div>
    </div>
  </div>

  <!-- Debug -->
  <div class="panel">
    <div class="panel-header">
      Debug-Log
      <button class="btn btn-ghost" style="padding:3px 8px;font-size:11px;"
        onclick="document.getElementById('log').innerHTML=''">löschen</button>
    </div>
    <div class="panel-body">
      <div class="log" id="log"></div>
    </div>
  </div>

</main>

<script>
let db = null;
let stats = { total: 0, richtig: 0, falsch: 0 };
let aktuelleAntwort = null;

function log(msg) {
  const el = document.getElementById('log');
  const ts = new Date().toLocaleTimeString('de', { hour12: false });
  el.innerHTML += `<div>${ts} ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function updateStats() {
  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-richtig').textContent = stats.richtig;
  document.getElementById('stat-falsch').textContent = stats.falsch;
  const pct = stats.total > 0 ? Math.round(stats.richtig / stats.total * 100) + '%' : '—';
  document.getElementById('stat-pct').textContent = pct;
}

// ─── Datenbank laden ─────────────────────────────────────────
async function loadDB() {
  log('Lade sql.js WebAssembly...');
  const SQL = await initSqlJs({
    locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`
  });
  log('Lade geo.sqlite...');
  const resp = await fetch('geo.sqlite');
  if (!resp.ok) throw new Error('geo.sqlite nicht gefunden — liegt sie im LernApp-Ordner?');
  const buf = await resp.arrayBuffer();
  db = new SQL.Database(new Uint8Array(buf));
  const count = db.exec("SELECT COUNT(*) FROM stadt WHERE staat_id='DE'")[0].values[0][0];
  log(`Datenbank geladen: ${count} Städte in Deutschland`);
  document.getElementById('status-badge').textContent = count + ' Städte';
  document.getElementById('status-badge').className = 'badge badge-green';
  document.getElementById('btn-naechste').disabled = false;
  naechsteFrage();
}

// ─── Zufallszahl ─────────────────────────────────────────────
function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ─── Stadt zufällig wählen ───────────────────────────────────
function getRandomStadt(schwierigkeit) {
  let minEinw = 0;
  if (schwierigkeit === 'gross')  minEinw = 50000;
  if (schwierigkeit === 'mittel') minEinw = 10000;

  const query = minEinw > 0
    ? `SELECT s.id, t.value as name, s.bundesland_id, s.einwohner, s.hoehe_m
       FROM stadt s
       JOIN translations t ON t.objekt_id = s.id AND t.lang = 'de' AND t.key = 'name'
       WHERE s.staat_id = 'DE'
         AND s.bundesland_id IS NOT NULL
         AND s.einwohner >= ${minEinw}
       ORDER BY RANDOM() LIMIT 1`
    : `SELECT s.id, t.value as name, s.bundesland_id, s.einwohner, s.hoehe_m
       FROM stadt s
       JOIN translations t ON t.objekt_id = s.id AND t.lang = 'de' AND t.key = 'name'
       WHERE s.staat_id = 'DE'
         AND s.bundesland_id IS NOT NULL
       ORDER BY RANDOM() LIMIT 1`;

  const res = db.exec(query);
  if (!res.length || !res[0].values.length) return null;
  const [id, name, bl_id, einwohner, hoehe] = res[0].values[0];
  return { id, name, bl_id, einwohner, hoehe };
}

// ─── Bundesland-Name ─────────────────────────────────────────
function getBundeslandName(bl_id) {
  const res = db.exec(
    `SELECT value FROM translations WHERE pool='bundesland' AND objekt_id=? AND lang='de'`,
    [bl_id]
  );
  return res.length ? res[0].values[0][0] : bl_id;
}

// ─── Alle Bundesland-Namen ────────────────────────────────────
function getAlleBundeslaender() {
  const res = db.exec(
    `SELECT b.id, t.value FROM bundesland b
     JOIN translations t ON t.objekt_id = b.id AND t.lang = 'de' AND t.pool = 'bundesland'
     WHERE b.staat_id = 'DE'`
  );
  if (!res.length) return [];
  return res[0].values.map(([id, name]) => ({ id, name }));
}

// ─── Fragentyp: Bundesland ────────────────────────────────────
function generateBundeslandFrage(schwierigkeit) {
  const stadt = getRandomStadt(schwierigkeit);
  if (!stadt) return null;

  const richtigName = getBundeslandName(stadt.bl_id);
  const alle = getAlleBundeslaender();
  const distraktoren = shuffle(alle.filter(bl => bl.id !== stadt.bl_id))
    .slice(0, 3)
    .map(bl => bl.name);

  const antworten = shuffle([richtigName, ...distraktoren]);
  const richtig_index = antworten.indexOf(richtigName);

  return {
    fragetext: `In welchem Bundesland liegt ${stadt.name}?`,
    antworten,
    richtig_index,
    erklaerung: `${stadt.name} liegt in ${richtigName}.` +
      (stadt.einwohner ? ` Die Stadt hat ${stadt.einwohner.toLocaleString('de')} Einwohner.` : ''),
    typ: 'attributabfrage',
    attribut: 'bundesland',
    objekt: stadt.name,
  };
}

// ─── Fragentyp: Einwohner schätzen ───────────────────────────
function generateEinwohnerFrage(schwierigkeit) {
  const stadt = getRandomStadt('gross'); // Einwohnerfrage nur für große Städte sinnvoll
  if (!stadt || !stadt.einwohner) return generateBundeslandFrage(schwierigkeit);

  const e = stadt.einwohner;
  // Richtige Antwort als Größenordnung
  function formatEinw(n) {
    if (n >= 1000000) return `ca. ${(n/1000000).toFixed(1).replace('.',',')} Mio.`;
    if (n >= 100000)  return `ca. ${Math.round(n/10000)*10}.000`;
    return `ca. ${Math.round(n/1000)*1000 === n ? n.toLocaleString('de') : Math.round(n/5000)*5000 + ''}`;
  }

  const richtig = formatEinw(e);
  // Distraktoren: Faktor 0.3x, 0.5x, 2x, 3x
  const faktoren = shuffle([0.3, 0.5, 2.0, 3.0]).slice(0, 3);
  const distraktoren = faktoren.map(f => formatEinw(Math.round(e * f)));

  const antworten = shuffle([richtig, ...distraktoren]);
  const richtig_index = antworten.indexOf(richtig);

  return {
    fragetext: `Wie viele Einwohner hat ${stadt.name}?`,
    antworten,
    richtig_index,
    erklaerung: `${stadt.name} hat ${e.toLocaleString('de')} Einwohner (${getBundeslandName(stadt.bl_id)}).`,
    typ: 'schaetzung',
    attribut: 'einwohner',
    objekt: stadt.name,
  };
}

// ─── Fragentyp: Höhe schätzen ─────────────────────────────────
function generateHoeheFrage(schwierigkeit) {
  // Städte mit Höhenangabe
  const res = db.exec(
    `SELECT s.id, t.value as name, s.hoehe_m, s.bundesland_id
     FROM stadt s
     JOIN translations t ON t.objekt_id = s.id AND t.lang = 'de' AND t.key = 'name'
     WHERE s.staat_id = 'DE' AND s.hoehe_m IS NOT NULL AND s.hoehe_m > 0
     ORDER BY RANDOM() LIMIT 1`
  );
  if (!res.length || !res[0].values.length) return generateBundeslandFrage(schwierigkeit);

  const [id, name, hoehe, bl_id] = res[0].values[0];

  // Höhenbereiche als Antworten
  function hoeheBereich(h) {
    if (h < 50)   return 'unter 50 m';
    if (h < 100)  return '50 – 100 m';
    if (h < 200)  return '100 – 200 m';
    if (h < 400)  return '200 – 400 m';
    if (h < 700)  return '400 – 700 m';
    return 'über 700 m';
  }

  const bereiche = ['unter 50 m','50 – 100 m','100 – 200 m','200 – 400 m','400 – 700 m','über 700 m'];
  const richtig = hoeheBereich(hoehe);
  const distraktoren = shuffle(bereiche.filter(b => b !== richtig)).slice(0, 3);
  const antworten = shuffle([richtig, ...distraktoren]);
  const richtig_index = antworten.indexOf(richtig);

  return {
    fragetext: `In welchem Höhenbereich liegt ${name}?`,
    antworten,
    richtig_index,
    erklaerung: `${name} liegt auf ${hoehe} m Höhe (${hoeheBereich(hoehe)}).`,
    typ: 'schaetzung',
    attribut: 'hoehe',
    objekt: name,
  };
}

// ─── Frage generieren (Dispatcher) ───────────────────────────
function generateQuestion(typ, schwierigkeit) {
  switch(typ) {
    case 'bundesland': return generateBundeslandFrage(schwierigkeit);
    case 'einwohner':  return generateEinwohnerFrage(schwierigkeit);
    case 'hoehe':      return generateHoeheFrage(schwierigkeit);
    default:           return generateBundeslandFrage(schwierigkeit);
  }
}

// ─── UI: Frage anzeigen ──────────────────────────────────────
function naechsteFrage() {
  if (!db) return;
  document.getElementById('weiter-row').style.display = 'none';
  document.getElementById('erklaerung').style.display = 'none';

  const typ = document.getElementById('sel-typ').value;
  const schwierigkeit = document.getElementById('sel-schwierigkeit').value;

  const frage = generateQuestion(typ, schwierigkeit);
  if (!frage) { log('Keine Frage generiert — DB leer?'); return; }

  aktuelleAntwort = frage.richtig_index;

  document.getElementById('frage-text').textContent = frage.fragetext;
  document.getElementById('frage-badge').textContent = frage.typ + ' · ' + frage.attribut;
  document.getElementById('frage-badge').className = 'badge badge-purple';

  const container = document.getElementById('antworten');
  container.innerHTML = '';
  frage.antworten.forEach((antwort, i) => {
    const btn = document.createElement('button');
    btn.className = 'antwort-btn';
    btn.textContent = antwort;
    btn.onclick = () => antwortWaehlen(i, frage);
    container.appendChild(btn);
  });

  log(`Frage: "${frage.fragetext.slice(0,60)}..."`);
}

function antwortWaehlen(index, frage) {
  const buttons = document.querySelectorAll('.antwort-btn');
  buttons.forEach(b => b.disabled = true);

  const richtig = index === frage.richtig_index;
  buttons[index].className = 'antwort-btn ' + (richtig ? 'richtig' : 'falsch');
  if (!richtig) buttons[frage.richtig_index].className = 'antwort-btn richtig';

  stats.total++;
  if (richtig) stats.richtig++; else stats.falsch++;
  updateStats();

  const erkl = document.getElementById('erklaerung');
  erkl.textContent = frage.erklaerung;
  erkl.style.display = 'block';

  document.getElementById('weiter-row').style.display = 'flex';
  log(richtig ? '✓ Richtig!' : '✗ Falsch — ' + frage.antworten[frage.richtig_index]);
}

// ─── Start ───────────────────────────────────────────────────
loadDB().catch(e => {
  log('FEHLER: ' + e.message);
  document.getElementById('status-badge').textContent = 'Fehler';
  document.getElementById('status-badge').className = 'badge badge-red';
  document.getElementById('frage-text').textContent = 'Fehler: ' + e.message;
});
</script>
</body>
</html>
