services:
  - type: web
    name: quizaway
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/sync/rendezvous.py --port $PORT
    envVars:
      - key: PORT
        value: 10000

  - type: web
    name: duellmaschine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c "cd scripts/sync && python duellmaschine.py"
    envVars:
      - key: PORT
        value: 10000
